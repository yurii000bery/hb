<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Для тебе — подарунок</title>
  <meta name="description" content="Головна папка з подарунком для Дідуся." />
  <meta name="theme-color" content="#f4eadf" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="dlya-tebe">
  <div class="texture" aria-hidden="true"></div>

  <main class="subpage-shell">
    <a class="back-link" href="index.html" aria-label="Повернутися на головну">← На головну</a>

    <section class="reveal-page reveal reveal-page--gift" aria-labelledby="gift-title">
      <p class="folder-kicker">Папка 02</p>
      <h1 id="gift-title">Для тебе</h1>
      <p class="lead">А тут — головний подарунок. Нехай він принесе радість, нові спогади і ще більше часу разом із нами.</p>

      <button class="gift-image-card" type="button" aria-label="Відкрити подарунок на весь екран">
  <img
    src="img/football_voucher_porto.png"
    alt="Подарунок для Дідуся"
    loading="eager"
    decoding="async"
  />
  <span class="gift-image-card__hint">Тицьни тут, щоб відкрити</span>
</button>

<div class="image-lightbox" aria-hidden="true" role="dialog" aria-label="Подарунок на весь екран">
  <button class="image-lightbox__close" type="button" aria-label="Закрити">×</button>
  <img src="img/football_voucher_porto.png" alt="Подарунок для Дідуся" />
</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
