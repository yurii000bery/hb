<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>З днем народження, Дідусю</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #efe6da;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .page {
      position: relative;
      width: min(100vw, 1149px);
      aspect-ratio: 1149 / 1369;
      overflow: hidden;
      background: #efe6da;
      box-shadow: 0 20px 70px rgba(72, 49, 30, .18);
    }
    .poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .folder-button {
      position: absolute;
      z-index: 5;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      border-radius: 5%;
      -webkit-tap-highlight-color: transparent;
    }
    .folder-button:focus-visible {
      outline: 3px solid rgba(114, 82, 50, .65);
      outline-offset: 5px;
    }
    .folder-button.left {
      left: 4.6%;
      top: 75.9%;
      width: 42.1%;
      height: 16.7%;
    }
    .folder-button.right {
      left: 51.6%;
      top: 75.9%;
      width: 42.9%;
      height: 16.7%;
    }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(36, 24, 16, .72);
      backdrop-filter: blur(8px);
    }
    .modal.open { display: flex; }
    .modal-card {
      position: relative;
      width: min(94vw, 920px);
      max-height: 88vh;
      padding: 18px;
      border-radius: 24px;
      background: #f8efe4;
      box-shadow: 0 24px 90px rgba(0,0,0,.38);
    }
    .modal video,
    .modal img {
      display: block;
      width: 100%;
      max-height: calc(88vh - 36px);
      object-fit: contain;
      border-radius: 16px;
      background: #14100c;
    }
    .close {
      position: absolute;
      right: 10px;
      top: 10px;
      z-index: 2;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      color: #6f5238;
      font-size: 28px;
      line-height: 42px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.18);
    }
    @media (max-width: 760px) {
      body { background: #efe6da; }
      .page { width: 100vw; box-shadow: none; }
      .modal { padding: 12px; }
      .modal-card { padding: 10px; border-radius: 18px; }
      .close { right: 4px; top: 4px; }
    }
  </style>
</head>

    <button class="folder-button left" type="button" aria-label="Відкрити папку Ми тут" data-open="video"></button>
    <button class="folder-button right" type="button" aria-label="Відкрити папку Для тебе" data-open="image"></button>
  </main>

  <div class="modal" id="mediaModal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-card">
      <button class="close" type="button" aria-label="Закрити">×</button>
      <div id="mediaSlot"></div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('mediaModal');
    const mediaSlot = document.getElementById('mediaSlot');
    const closeBtn = modal.querySelector('.close');

    function openVideo() {
      mediaSlot.innerHTML = '<video src="media/video/video.mov" controls autoplay playsinline preload="auto">Ваш браузер не підтримує відео.</video>';
      showModal();
      const video = mediaSlot.querySelector('video');
      video.play().catch(() => {});
    }

    function openImage() {
      mediaSlot.innerHTML = '<img src="media/img/img.png" alt="Подарунок для тебе">';
      showModal();
    }

    function showModal() {
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      closeBtn.focus({ preventScroll: true });
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      mediaSlot.innerHTML = '';
    }

    document.querySelectorAll('.folder-button').forEach((button) => {
      button.addEventListener('click', () => {
        button.dataset.open === 'video' ? openVideo() : openImage();
      });
    });

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && modal.classList.contains('open')) closeModal();
    });
  </script>
</body>
